<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Edit Coupon')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar py-3">
            <div th:replace="~{layout :: sidebar}"></div>
        </nav>
        <main class="col-md-10 main-content p-4">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/web/coupons}" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h2 class="fw-bold mb-0"><i class="bi bi-pencil me-2"></i>Edit Coupon</h2>
                    <p class="text-muted mb-0 small">ID: <code th:text="${coupon.id}"></code></p>
                </div>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
            </div>

            <div class="row">
                <div class="col-md-7">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <form method="post" th:action="@{/web/coupons/edit/{id}(id=${coupon.id})}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Coupon ID</label>
                                    <input type="text" class="form-control bg-light" th:value="${coupon.id}" readonly/>
                                    <div class="form-text">ID cannot be changed.</div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Name</label>
                                    <input type="text" name="name" class="form-control"
                                           placeholder="Display name" th:value="${coupon.name}"/>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Percent Off</label>
                                        <input type="number" name="percentOff" class="form-control"
                                               step="0.01" min="0" max="100" placeholder="e.g. 25.0"
                                               th:value="${coupon.percentOff}"/>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Amount Off (cents)</label>
                                        <input type="number" name="amountOff" class="form-control"
                                               min="0" placeholder="e.g. 500"
                                               th:value="${coupon.amountOff}"/>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Currency</label>
                                        <input type="text" name="currency" class="form-control"
                                               maxlength="3" placeholder="e.g. usd"
                                               th:value="${coupon.currency}"/>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Duration</label>
                                        <select name="duration" class="form-select">
                                            <option value="forever" th:selected="${coupon.duration == 'forever'}">forever</option>
                                            <option value="once" th:selected="${coupon.duration == 'once'}">once</option>
                                            <option value="repeating" th:selected="${coupon.duration == 'repeating'}">repeating</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Duration in Months</label>
                                        <input type="number" name="durationInMonths" class="form-control"
                                               min="1" placeholder="Only for repeating"
                                               th:value="${coupon.durationInMonths}"/>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Max Redemptions</label>
                                        <input type="number" name="maxRedemptions" class="form-control"
                                               min="1" placeholder="Leave blank for unlimited"
                                               th:value="${coupon.maxRedemptions}"/>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold">Valid</label>
                                    <select name="valid" class="form-select">
                                        <option value="true" th:selected="${coupon.valid != false}">Valid (true)</option>
                                        <option value="false" th:selected="${coupon.valid == false}">Invalid (false)</option>
                                    </select>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-save me-2"></i>Save Changes
                                    </button>
                                    <a th:href="@{/web/coupons}" class="btn btn-outline-secondary">Cancel</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
