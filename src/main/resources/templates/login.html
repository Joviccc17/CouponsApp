<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login')}"></head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="card shadow-lg" style="width:380px;">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <i class="bi bi-tag-fill text-primary" style="font-size:2.5rem;"></i>
            <h4 class="mt-2 fw-bold">CouponManager</h4>
            <p class="text-muted small">IIS Final Project</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle me-1"></i>Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            <i class="bi bi-check-circle me-1"></i>You have been logged out.
        </div>

        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin / viewer" autofocus required/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Password" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
        </form>

        <hr class="my-3"/>
        <div class="text-center small text-muted">
            <strong>Demo accounts:</strong><br/>
            <code>admin</code> / <code>admin123</code> — Full Access<br/>
            <code>viewer</code> / <code>viewer123</code> — Read Only
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
