<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('SOAP Search')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar py-3">
            <div th:replace="~{layout :: sidebar}"></div>
        </nav>
        <main class="col-md-10 main-content p-4">
            <h2 class="fw-bold mb-1"><i class="bi bi-search me-2"></i>SOAP Coupon Search</h2>
            <p class="text-muted mb-4">
                <a href="/soap/coupons?wsdl" target="_blank"><code>SOAP wsdl: /soap/coupons?wsdl</code></a>
            </p>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <form method="post" th:action="@{/web/soap}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="row g-2 align-items-end">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Search Term</label>
                                <input type="text" name="term" class="form-control"
                                       placeholder="e.g. summer, SAVE, 10OFF..."
                                       th:value="${term}" required/>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="bi bi-search me-2"></i>Search via SOAP
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div th:if="${soapError}" class="alert alert-danger mb-3">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <strong>SOAP Error:</strong> <span th:text="${soapError}"></span>
            </div>

            <div th:if="${results != null}">
                <h5 class="fw-semibold mb-3">
                    Results for "<span th:text="${term}"></span>"
                    <span class="badge bg-secondary ms-2" th:text="${results.size()} + ' found'"></span>
                </h5>
                <div th:if="${results.isEmpty()}" class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i>No coupons matched the search term.
                </div>
                <div class="row g-3" th:unless="${results.isEmpty()}">
                    <div class="col-md-4" th:each="c : ${results}">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <h6 class="fw-bold"><code th:text="${c.id}"></code></h6>
                                <p class="small text-muted mb-1" th:text="${c.name ?: '—'}"></p>
                                <span th:if="${c.percentOff != null}" class="badge bg-primary" th:text="${c.percentOff + '% off'}"></span>
                                <span th:if="${c.amountOff != null}" class="badge bg-primary" th:text="${c.amountOff + ' off'}"></span>
                                <span class="badge" th:classappend="${c.valid} ? 'bg-success' : 'bg-secondary'" th:text="${c.valid} ? 'Valid' : 'Invalid'"></span>
                                <div class="text-muted small mt-1" th:text="${c.duration}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
